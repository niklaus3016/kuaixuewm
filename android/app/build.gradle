apply plugin: 'com.android.application'

android {
    namespace "com.kuaixuewm.app"
    compileSdkVersion rootProject.ext.compileSdkVersion
    buildToolsVersion '34.0.0'

    defaultConfig {
        applicationId "com.kuaixuewm.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    signingConfigs {
        release {
            def storeFilePath = project.hasProperty('android.injected.signing.store.file') ? project.property('android.injected.signing.store.file') : System.getenv("KEYSTORE_FILE")
            def storePass = project.hasProperty('android.injected.signing.store.password') ? project.property('android.injected.signing.store.password') : System.getenv("KEYSTORE_PASSWORD")
            def keyAliasName = project.hasProperty('android.injected.signing.key.alias') ? project.property('android.injected.signing.key.alias') : System.getenv("KEY_ALIAS")
            def keyPass = project.hasProperty('android.injected.signing.key.password') ? project.property('android.injected.signing.key.password') : System.getenv("KEY_PASSWORD")
            
            if (storeFilePath) {
                storeFile file(storeFilePath)
            }
            if (storePass) {
                storePassword storePass
            }
            if (keyAliasName) {
                keyAlias keyAliasName
            }
            if (keyPass) {
                keyPassword keyPass
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

apply from: 'capacitor.build.gradle'

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}
