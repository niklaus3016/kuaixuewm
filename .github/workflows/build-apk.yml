name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Check for signing secrets
      id: check_signing
      run: |
        if [ -n "${{ secrets.KEYSTORE_FILE }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
          echo "signing_available=true" >> $GITHUB_OUTPUT
        else
          echo "signing_available=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Release APK (Signed)
      if: steps.check_signing.outputs.signing_available == 'true'
      working-directory: android
      env:
        KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Upload Signed Release APK
      if: steps.check_signing.outputs.signing_available == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed.apk
        path: android/app/build/outputs/apk/release/app-release.apk

    - name: Build Release APK (Unsigned)
      if: steps.check_signing.outputs.signing_available == 'false'
      working-directory: android
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=

    - name: Upload Unsigned Release APK
      if: steps.check_signing.outputs.signing_available == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned.apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk